<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakta oss | KRP Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
          <img
            src="Images/KRP-logga.png"
            width="60"
            height="60"
            class="rounded-circle"
            alt="KRP Barbershop logotyp"
          />
        </a>
        <span class="navbar-text mx-auto fw-bold my-welcome-text d-sm-none">
          KRP-Barbershop!
        </span>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Visa navigering"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Hem</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="våraTjänster.html">Våra tjänster</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="omOss.html">Om oss</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="kontaktaOss.html">Kontakta oss</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container my-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div
            id="contactSuccess"
            class="alert alert-success d-none mb-4"
            role="alert"
          >
            Tack för ditt meddelande! Vi återkommer så snart vi kan.
          </div>
          <form id="contactForm" class="contact-form" data-aos="fade-up">
            <h2 class="text-center mb-4">Beskriv vad du behöver hjälp med</h2>
            <div class="mb-3">
              <label for="name" class="form-label">Namn</label>
              <input type="text" class="form-control" id="name" name="name" required />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">E-postadress</label>
              <input type="email" class="form-control" id="email" name="email" required />
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label">Ämne</label>
              <input type="text" class="form-control" id="subject" name="subject" required />
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Meddelande</label>
              <textarea
                class="form-control"
                id="message"
                name="message"
                rows="5"
                required
              ></textarea>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">Skicka</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <footer class="footer py-5 bg-dark text-white text-center">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-6 mb-4 mb-md-0">
            <h5 class="text-uppercase mb-3"><strong>Öppettider</strong></h5>
            <ul class="list-unstyled">
              <li>Mån-Fre: 10:00 - 19:00</li>
              <li>Lör: 11:00 - 17:00</li>
              <li>Sön: Stängt</li>
            </ul>
          </div>
          <div class="col-md-6">
            <h5 class="text-uppercase mb-3">
              <strong>Följ oss på sociala-medier</strong>
            </h5>
            <div class="social-links">
              <a
                href="https://www.instagram.com/"
                class="text-white mx-3 fs-3"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Följ oss på Instagram"
              >
                <i class="fab fa-instagram"></i>
              </a>
              <a
                href="https://www.facebook.com/"
                class="text-white mx-3 fs-3"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Följ oss på Facebook"
              >
                <i class="fab fa-facebook"></i>
              </a>
              <a
                href="https://www.tiktok.com/"
                class="text-white mx-3 fs-3"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Följ oss på TikTok"
              >
                <i class="fab fa-tiktok"></i>
              </a>
            </div>
          </div>
        </div>
        <hr class="my-4 border-secondary" />
        <p class="small text-muted mb-0">&copy; 2026 KRP Barbershop</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/KRP-Barbershop.js"></script>
    <script>
      AOS.init({
        duration: 1000,
        once: true,
      });
    </script>
  </body>
</html>
